apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  namespace: default
spec:
  ingressClassName: "nginx"
#  ingressClassName: "gce"
#  ingressClassName: gce
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      - path: /ping
        pathType: Prefix
        backend:
          service:
            name: echo-service
            port:
              number: 80

